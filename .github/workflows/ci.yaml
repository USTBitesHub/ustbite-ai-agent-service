name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  scan:
    if: github.event_name == 'pull_request'
    uses: USTBitesHub/ustbite-workflows/.github/workflows/sonar-and-snyk.yaml@main
    with:
      service_name: "ai-agent-service"
      service_path: "./"
      runtime: "python"
    secrets: inherit

  build:
    needs: scan
    if: github.event_name == 'push' || needs.scan.result == 'success'
    uses: USTBitesHub/ustbite-workflows/.github/workflows/generate-tag-and-build-image-trivy.yaml@main
    with:
      service_name: "ai-agent-service"
      service_path: "./"
    secrets: inherit

  push-image:
    needs: build
    if: github.event_name == 'push' && needs.build.result == 'success'
    uses: USTBitesHub/ustbite-workflows/.github/workflows/push.yaml@main
    with:
      service_name: "ai-agent-service"
      git_tag: ${{ needs.build.outputs.tag }}
      tag_exists: ${{ needs.build.outputs.tag_exists }}
    secrets: inherit

  prod-gate:
    needs: push-image
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Approved for production deployment"

  helm-update:
    needs: [push-image, prod-gate]
    if: github.event_name == 'push' && needs.push-image.result == 'success' && (github.ref_name != 'main' || needs.prod-gate.result == 'success')
    uses: USTBitesHub/ustbite-workflows/.github/workflows/helm-updater-job.yaml@main
    with:
      service_name: "ai-agent-service"
      image_tag: ${{ needs.push-image.outputs.tag }}
      helm_values_path: "charts/ai-agent-service/values.yaml"
      target_branch: ${{ github.ref_name }}
    secrets: inherit

  notify-status:
    if: always() && github.event_name == 'push'
    needs: [scan, build, push-image, prod-gate, helm-update]
    uses: USTBitesHub/ustbite-workflows/.github/workflows/notify.yaml@main
    with:
      service_name: "ai-agent-service"
      git_tag: ${{ needs.push-image.outputs.tag || 'N/A' }}
      sonarqube_result: ${{ needs.scan.outputs.sonarqube_result || 'skipped' }}
      snyk_result: ${{ needs.scan.outputs.snyk_result || 'skipped' }}
      build_result: ${{ needs.build.outputs.build_result || 'skipped' }}
      trivy_result: ${{ needs.build.outputs.trivy_result || 'skipped' }}
      push_result: ${{ needs.push-image.result || 'skipped' }}
    secrets: inherit
